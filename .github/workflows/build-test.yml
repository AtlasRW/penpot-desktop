name: BuildTest

# on: [push, pull_request, workflow_call]
# on: [workflow_call]
on: [push]

permissions:
  # Required for Electron Builder to create and update releases on Github
  contents: write

env:
  DEPENDENCIES_BOT_NAME: "dependabot[bot]"

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os}}

    steps:
      - name: Create a File
        run: |
          mkdir dist
          echo "hello from ${{ matrix.os }}" > dist/file-${{ matrix.os }}-1.txt
          echo "hello again from ${{ matrix.os }}" > dist/file-${{ matrix.os }}-2.txt
      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/*.txt
          retention-days: 1

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != env.DEPENDENCIES_BOT_NAME
    # && contains(github.event.pull_request.base.ref, 'release') && startsWith(github.head_ref, 'releases/')

    steps:
      - run: echo ${{toJson(github)}}
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: my-artifact
          merge-multiple: true
      - run: ls -R
