name: Release

on:
  pull_request:
    branches: [homebrew-test]
    # branches: [main]
    types: [closed]

jobs:
  build:
    if: github.event.pull_request.merged == true && contains(github.head_ref, 'chore/release')

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/build
        with:
          # dependencies-bot-name:
          # is-publish:
          build-os: ${{ matrix.os }}
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          # artifacts-paths: |
          #   dist/file-*-1.txt
          #   dist/file-*-2.txt
          artifacts-paths: |
            dist/latest*.yml
            dist/*.exe
            dist/*.AppImage
            dist/*.dmg
            dist/*.rpm
            dist/*.deb
            dist/*.zip
            dist/*.blockmap

  release:
    needs: [build]
    runs-on: ubuntu-latest
    # if: github.event.pull_request.merged == true && contains(github.head_ref, 'chore/release')

    steps:
      # - run: echo $GITHUB_CONTEXT
      #   env:
      #     GITHUB_CONTEXT: ${{toJson(github)}}
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          # run-id: ${{ github.event.workflow_run.id }}
          # github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: build-*
          # path: my-artifact
          merge-multiple: true
      - run: ls -R
