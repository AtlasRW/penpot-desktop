name: Release

# on: [push, pull_request]

# on:
#   workflow_call:
#   workflow_run:
#   #   workflows: [Build Test]
#   #   types: [completed]
on:
  pull_request:
    branches: [homebrew-test]
    types: [closed]

jobs:
  build:
    if: github.event.pull_request.merged == true && contains(github.head_ref, 'chore/release')
    uses: ./.github/workflows/build-int.yml
    # with:
    #   artifacts-paths: dist/file-*-1.txt
    with:
      artifacts-paths: |
        dist/file-*-1.txt
        dist/file-*-2.txt
    # with:
    #   artifacts-paths: |
    #     dist/latest*.yml
    #     dist/*.exe
    #     dist/*.AppImage
    #     dist/*.dmg
    #     dist/*.rpm
    #     dist/*.deb
    #     dist/*.zip
    #     dist/*.blockmap

  release:
    needs: [build]
    runs-on: ubuntu-latest
    # if: github.event.pull_request.merged == true && contains(github.head_ref, 'chore/release')

    steps:
      - run: echo $GITHUB_CONTEXT
        env:
          GITHUB_CONTEXT: ${{toJson(github)}}
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          # run-id: ${{ github.event.workflow_run.id }}
          # github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: build-*
          # path: my-artifact
          merge-multiple: true
      - run: ls -R
