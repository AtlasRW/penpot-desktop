name: Release

on:
  pull_request:
    branches: [homebrew-test]
    # branches: [main]
    types: [closed]
  push:
    tags: [v*.*.*]

permissions:
  # Required for Electron Builder to create and update releases on Github
  contents: write

jobs:
  build:
    if: |
      github.ref_type == 'tag' ||
      (github.event.pull_request.merged == true && contains(github.head_ref, 'chore/release'))

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/build
        with:
          build-os: ${{ matrix.os }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # artifacts-paths: |
          #   dist/file-*-1.txt
          #   dist/file-*-2.txt
          artifacts-paths: |
            dist/*.exe
            dist/*.AppImage
            dist/*.dmg
            dist/*.rpm
            dist/*.deb
            dist/*.zip

  release:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      # - run: echo $GITHUB_CONTEXT
      #   env:
      #     GITHUB_CONTEXT: ${{toJson(github)}}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          # path: artifacts
          pattern: build-*
          merge-multiple: true
          # github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Release
        uses: softprops/action-gh-release@v2
        # if: github.ref_type == 'tag'
        with:
          # name: ""
          # tag_name: ${{}} chore/release
          draft: true
          make_latest: true
          append_body: true
          generate_release_notes: true
          files: |
            *.exe
            *.AppImage
            *.dmg
            *.rpm
            *.deb
            *.zip
          body: "HEY"
